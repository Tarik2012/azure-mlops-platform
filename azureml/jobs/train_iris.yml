$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: train-iris-mlflow
experiment_name: iris-azureml-training
description: Train and evaluate an Iris classifier with MLflow tracking.
code: ../../src
command: >-
  python -m training.train_azureml
  --model-output ${{outputs.model_output}}
  --test-size 0.2
  --random-state 42
environment: azureml:sklearn-mlflow:1
compute: azureml:cpu-amlops-tarik2012-dev
outputs:
  model_output:
    type: uri_folder
    mode: rw_mount

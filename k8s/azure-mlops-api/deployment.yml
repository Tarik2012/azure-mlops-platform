apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-mlops-api
  namespace: azure-mlops
  labels:
    app.kubernetes.io/name: azure-mlops-api
    app.kubernetes.io/part-of: azure-mlops-platform
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: azure-mlops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: azure-mlops-api
        app.kubernetes.io/part-of: azure-mlops-platform
    spec:
      containers:
        - name: api
          image: acrtarik2012azuremlopsdev.azurecr.io/azure-mlops-platform-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3

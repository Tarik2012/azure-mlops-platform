name: Deploy Azure MLOps Platform

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-mlops-platform-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Platform and App
    runs-on: ubuntu-latest
    environment: azure-dev
    env:
      PYTHON_VERSION: "3.12"
      IMAGE_NAME: azure-mlops-platform-api
      IMAGE_TAG: ${{ github.sha }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required GitHub variables
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TFSTATE_RESOURCE_GROUP_NAME: ${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}
          TFSTATE_STORAGE_ACCOUNT_NAME: ${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}
          TFSTATE_CONTAINER_NAME: ${{ vars.TFSTATE_CONTAINER_NAME }}
        run: |
          required_vars=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            TFSTATE_RESOURCE_GROUP_NAME
            TFSTATE_STORAGE_ACCOUNT_NAME
            TFSTATE_CONTAINER_NAME
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub variable: $name"
              exit 1
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate model artifact for deployment image
        run: python scripts/run_local_pipeline.py

      - name: Create pytest temp directory
        run: mkdir -p .tmp

      - name: Run test suite
        run: python -m pytest

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init platform
        run: >
          terraform -chdir=infra/terraform/platform init -input=false
          -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}"
          -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}"
          -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}"
          -backend-config="key=platform.tfstate"
          -backend-config="use_azuread_auth=true"

      - name: Terraform validate platform
        run: terraform -chdir=infra/terraform/platform validate

      - name: Terraform plan platform
        run: terraform -chdir=infra/terraform/platform plan -out=tfplan

      - name: Terraform apply platform
        run: terraform -chdir=infra/terraform/platform apply -auto-approve tfplan

      - name: Read platform outputs
        shell: bash
        run: |
          echo "ACR_NAME=$(terraform -chdir=infra/terraform/platform output -raw acr_name)" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$(terraform -chdir=infra/terraform/platform output -raw acr_login_server)" >> "$GITHUB_ENV"

      - name: Build deployment image
        run: docker build -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" .

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Push deployment image
        run: docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

      - name: Terraform init app
        run: >
          terraform -chdir=infra/terraform/app init -input=false
          -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}"
          -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}"
          -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}"
          -backend-config="key=app.tfstate"
          -backend-config="use_azuread_auth=true"

      - name: Terraform validate app
        run: terraform -chdir=infra/terraform/app validate

      - name: Terraform plan app
        run: terraform -chdir=infra/terraform/app plan -out=tfplan -var="container_image=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

      - name: Terraform apply app
        run: >
          terraform -chdir=infra/terraform/app apply -auto-approve tfplan

      - name: Read container app URL
        shell: bash
        run: |
          echo "CONTAINER_APP_URL=$(terraform -chdir=infra/terraform/app output -raw container_app_url)" >> "$GITHUB_ENV"

      - name: Wait for health endpoint
        shell: bash
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error "$CONTAINER_APP_URL/health" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Health check not ready yet. Attempt $attempt/20."
            sleep 15
          done

          echo "Container App health endpoint did not become ready in time."
          exit 1

      - name: Smoke test model metadata endpoint
        run: curl --fail --silent --show-error "$CONTAINER_APP_URL/model-info"

      - name: Smoke test prediction endpoint
        run: >
          curl --fail --silent --show-error
          -H "Content-Type: application/json"
          -d "{\"sepal_length\":5.1,\"sepal_width\":3.5,\"petal_length\":1.4,\"petal_width\":0.2}"
          "$CONTAINER_APP_URL/predict"

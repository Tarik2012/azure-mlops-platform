name: Azure MLOps Platform CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          # Install the project requirements when the repository provides them.
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          # Ensure pytest is available even if it is not pinned in requirements.txt.
          python -m pip install pytest

      - name: Run test suite
        run: python -m pytest

      - name: Build Docker image locally
        run: docker build -t azure-mlops-platform-api:ci .
